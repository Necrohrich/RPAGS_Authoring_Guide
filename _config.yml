title: "Game System Authoring Guide"
description: "Документация для авторов игровых систем"

theme: just-the-docs

# URL репозитория — замени на свой
url: "https://Necrohrich.github.io"
baseurl: "/RPAGS_Authoring_Guide"

# Поиск по документации (встроен в тему)
search_enabled: true
search:
  heading_level: 2
  previews: 2

# Цветовая схема: light | dark
color_scheme: dark

# Кнопка "Edit on GitHub" — замени на свой репо
gh_edit_link: true
gh_edit_link_text: "Редактировать страницу"
gh_edit_repository: "https://github.com/Necrohrich/RPAGS_Authoring_Guide"
gh_edit_branch: "main"
gh_edit_source: root
gh_edit_view_mode: "tree"

# Вспомогательные ссылки в шапке (опционально)
# aux_links:
#   "GitHub":
#     - "https://github.com/your-username/your-repo"

aux_links_new_tab: true

# Футер
footer_content: "Game Engine RPG Docs"

# Плагины — необходимы для GitHub Pages
plugins:
  - jekyll-seo-tag

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Важно
    color: blue
  new:
    title: Новое
    color: green
  note:
    title: Примечание
    color: purple
  warning:
    title: Предупреждение
    color: red
